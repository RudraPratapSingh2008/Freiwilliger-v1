name: Deploy Frontend
on:
  push:
    branches: [main]
    paths: ['client/**']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
