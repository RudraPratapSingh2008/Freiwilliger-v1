name: Lint
on:
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint Client
        run: |
          npm ci
          npx eslint src/
        working-directory: client
      - name: Lint Server
        run: |
          npm ci
          npm run lint --if-present
        working-directory: server
